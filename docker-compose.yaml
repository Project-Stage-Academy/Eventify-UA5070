services:
  postgres:
    image: postgis/postgis:17-3.3
    container_name: eventify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_development
    ports:
      - "6000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ci_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_development"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:

networks:
  ci_network:
    driver: bridge
