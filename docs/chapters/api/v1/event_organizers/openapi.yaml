openapi: 3.1.0
info:
  title: Eventify API
  version: "1.0.0"
  description: |
    EventOrganizers endpoints for managing organizers of events.
    Add and remove organizers for events.

servers:
  - url: http://localhost:3000
    description: Local dev

tags:
  - name: EventOrganizers
    description: Organizers of events

paths:
  /api/v1/events/{event_id}/organizers:
    post:
      summary: Add an organizer to an event
      tags: [EventOrganizers]
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
              required:
                - user_id
      responses:
        "201":
          description: Organizer added
        "403":
          description: Forbidden
        "422":
          description: Unprocessable entity

  /api/v1/events/{event_id}/organizers/{user_id}:
    delete:
      summary: Remove an organizer from an event
      tags: [EventOrganizers]
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organizer removed
        "403":
          description: Cannot remove last organizer or unauthorized
        "404":
          description: Organizer not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
