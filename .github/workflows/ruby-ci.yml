name: RUBY-CI

on:
  push:
    branches: ["issue-**"]
    paths:
      - "api/**"
      - ".github/workflows/ruby-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "api/**"
      - ".github/workflows/ruby-ci.yml"
  workflow_dispatch: {}

env:
  PROJECT_DIR: ./api

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: ${{env.PROJECT_DIR}}
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bundle exec brakeman --no-pager

  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: ${{env.PROJECT_DIR}}
          bundler-cache: true

      - name: Lint code for consistent style
        run: bundle exec rubocop -f github

  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    services:
      postgres:
        image: postgis/postgis:17-master
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: api_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d api_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: ${{env.PROJECT_DIR}}
          bundler-cache: true

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Drop PostGIS geocoder if exists
        env:
          PGPASSWORD: ${{ env.DATABASE_PASSWORD }}
        run: |
          psql -h localhost -U ${{ env.DATABASE_USERNAME }} -d ${{ env.POSTGRES_DB || 'api_test' }} -c "DROP EXTENSION IF EXISTS postgis_tiger_geocoder CASCADE;"

      - name: Prepare database
        run: |
          bundle exec rails db:create
          bundle exec rails db:migrate

      - name: Run RSpec tests
        run: bundle exec rspec

