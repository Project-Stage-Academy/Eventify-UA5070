openapi: 3.0.1
info:
  title: Eventify API
  version: v1
  description: Base spec

paths:
  /api/v1/events:
    get:
      summary: List events
      tags: [Events]
      responses:
        "200":
          description: OK

  /api/v1/events/{event_id}/organizers:
    post:
      summary: Add an organizer to an event
      tags:
        - EventOrganizers
      parameters:
        - name: Authorization
          in: header
          description: Bearer token
          schema:
            type: string
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: organizer added
        "403":
          description: forbidden
        "422":
          description: unprocessable entity
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
              required:
                - user_id

  /api/v1/events/{event_id}/organizers/{user_id}:
    delete:
      summary: Remove an organizer from an event
      tags:
        - EventOrganizers
      parameters:
        - name: Authorization
          in: header
          description: Bearer token
          schema:
            type: string
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: organizer removed
        "403":
          description: cannot remove last organizer or unauthorized
        "404":
          description: organizer not found

servers:
  - url: http://localhost:3000
    variables:
      defaultHost:
        default: localhost:3000
