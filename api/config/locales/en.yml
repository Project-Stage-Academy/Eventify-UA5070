# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"
  activerecord:
    errors:
      models:
        event:
          attributes:
            start_date:
              not_in_future: "The event's start date must be in the future"
            finish_date:
              after_start_date: "The event's finish date must be after its start date"
        event_member:
          attributes:
            rating:
              required_if_comment_present: "Rating is required if comment is present"
  errors:
    common:
      invalid_params: "Invalid parameters"
      forbidden: "Forbidden"
    auth:
      invalid_credentials: "Invalid email or password"
      missing_bearer_token: "Missing bearer token"
      expired_token: "Session expired. Please log in again."
      invalid_token: "Invalid token"
    user:
      not_found: "User not found"
      email_taken: "Email is already taken"
    event:
      not_found: "Event not found"
      validation_error: "Validation failed for event"
    event_member:
      not_found: "Event member not found"
      validation_error: "Validation failed for event member"
